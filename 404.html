<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Route Not Found | DevBridge Kerala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center space-y-8 glass p-10 rounded-[40px] shadow-2xl border border-slate-200">
        <div class="relative inline-block">
            <h1 class="text-9xl font-800 text-slate-900 opacity-5 italic">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-6xl">🚧</span>
            </div>
        </div>
        
        <div class="space-y-2">
            <h2 class="text-3xl font-800 tracking-tight uppercase italic text-slate-900">Route Purged</h2>
            <p class="text-slate-500 font-medium leading-relaxed">The requested endpoint has been decommissioned or does not exist in the current build environment.</p>
        </div>

        <div class="pt-6">
            <a href="https://devbridgekerala.com" class="inline-block bg-slate-900 text-white px-10 py-4 rounded-2xl font-800 text-sm uppercase tracking-widest hover:bg-slate-800 transition-all hover:scale-105 active:scale-95 shadow-xl">
                Return to Command Center
            </a>
        </div>

        <div class="pt-8 border-t border-slate-100 italic">
            <p class="text-[9px] uppercase tracking-widest font-black opacity-30 text-slate-400">DevBridge Kerala Security Protocols Active</p>
        </div>
    </div>
</body>
</html>
